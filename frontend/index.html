<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const isAdmin = window.location.pathname.startsWith('/admin')
        let theme = 'dark'
        try {
          const stored = window.localStorage.getItem('xanvoraa-theme')
          theme = stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        } catch {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        const root = document.documentElement
        root.classList.add(`${isAdmin ? 'dark' : theme}-mode`)
        // Enable CSS theme transitions only after the first frame has painted,
        // so the initial render never triggers a visible flash.
        requestAnimationFrame(() => { root.classList.add('theme-ready') })
      })()
    </script>
